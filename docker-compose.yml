version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ipmf_db
    restart: always
    environment:
      POSTGRES_DB: ipmf_db
      POSTGRES_USER: ipmf_user
      POSTGRES_PASSWORD: ipmf_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: ipmf_backend
    restart: always
    env_file:
      - ./ipmf/.env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=ipmf_db
      - DB_USER=ipmf_user
      - DB_PASSWORD=ipmf_password
      - DB_HOST=db
      - DB_PORT=5432
      # Let collectstatic run through python or manual script if needed.
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./ipmf:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn ipmf.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: ipmf_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Expose the API address so frontend proxy connects correctly inside docker, 
      # or for browser fetching directly from localhost:8000
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    # Syncs local code for hot reloading
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Required for react-scripts hot reloading to work in docker
    stdin_open: true

volumes:
  postgres_data:
  static_volume:
  media_volume:
